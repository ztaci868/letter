<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Broadway font -->
  <link href="https://fonts.cdnfonts.com/css/broadway" rel="stylesheet">
  <link href="../global.css" rel="stylesheet"> 

  <title>Video Message</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Calibri', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      /* TWO-TONE BACKGROUND */
      background: linear-gradient(
        to bottom,
        #f3f0eb 0%,
        #f3f0eb 50%,
        #e7dfcf 50%,
        #e7dfcf 100%
      );
    }

    /* FULL-WIDTH TORN EDGE */
    body::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 50px;

      background: radial-gradient(circle at 25px -15px, transparent 25px, #e7dfcf 26px) repeat-x;
      background-size: 50px 50px;

      z-index: 1;
    }

    /* TOP LEFT TEXT */
    .header {
      position: absolute;
      top: 40px;
      left: 60px;
      color: #6F191C;
      font-family: 'Broadway', sans-serif;
      font-size: 4rem;
      line-height: 1.2;
      z-index: 2;
    }

    /* VIDEO CARD */
    .card {
      width: 90%;
      max-width: 900px;
      padding: 40px;
      border-radius: 10px;

      background: transparent;
      z-index: 2;
    }

    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BUTTON */
    .button-container {
      margin-top: 30px;
      text-align: center;
    }

    button {
      background-color: #5C6FA5;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #4E61A1;
    }

  </style>
</head>

<body>

  <div class="header">
    TO: MIYA<br>
    FROM: LUA
  </div>

  <div class="card">
    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/rg11urYBDL0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>

    <div class="button-container">
      <button onclick="location.href='../notifications/notifications.html'">
        Next
      </button>
    </div>
  </div>

</body>
</html>
