<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.cdnfonts.com/css/broadway" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="emailLayout.css">
  <link href="../global.css" rel="stylesheet"> 

  <title>Email</title>
</head>

<body>
  <body class="theme-3"></body>
  <div class="left-pattern"></div>

  <div class="email-card">

    <!-- HEADER -->
    <div class="email-header">
      <span>New Message</span>
      <span class="close-btn" onclick="history.back()">✕</span>
    </div>

    <!-- FROM / TO -->
  <div class="email-meta">
    <div class="meta-row">
      <span class="label">From:</span>
      <span class="value">Miyamoto Family</span>
    </div>
    <div class="meta-row">
      <span class="label">To:</span>
      <span class="value">Miya</span>
    </div>
  </div>

    <!-- VIDEO -->
    <iframe
      class="video"
      src="https://www.youtube.com/embed/HkdWrTNsXhI"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
