<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.cdnfonts.com/css/broadway" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="emailLayout.css">
  <link href="../global.css" rel="stylesheet"> 

  <title>Email</title>
</head>

<body>
  <body class="theme-2"></body>
  <div class="left-pattern"></div>

  <div class="email-card">

    <!-- HEADER -->
    <div class="email-header">
      <span>New Message</span>
      <span class="close-btn" onclick="history.back()">✕</span>
    </div>

    <!-- FROM / TO -->
  <div class="email-meta">
    <div class="meta-row">
      <span class="label">From:</span>
      <span class="value">Althea and Alexa</span>
    </div>
    <div class="meta-row">
      <span class="label">To:</span>
      <span class="value">Miya</span>
    </div>
  </div>

    <!-- VIDEO -->
    <iframe
      class="video"
      src="https://www.youtube.com/embed/SXGVwhur4sI"
      allowfullscreen>
    </iframe>

    <!-- 📸 ATTACHMENTS (OPTIONAL SECTION) -->
    <div class="attachments">
      <img src="../photos/13.jpg">
      <img src="../photos/14.jpg">
      <img src="../photos/15.jpg">
      <img src="../photos/16.jpg">
      <img src="../photos/17.jpg">
      <img src="../photos/18.jpg">
      <img src="../photos/19.jpg">
      <img src="../photos/20.jpg">
      <img src="../photos/21.jpg">
      <img src="../photos/22.jpg">
      <img src="../photos/23.jpg">
      <img src="../photos/24.jpg">
      <img src="../photos/25.jpg">
      <img src="../photos/26.jpg">
      <img src="../photos/27.jpg">
      <img src="../photos/28.jpg">
    </div>

  </div>

</body>
</html>
