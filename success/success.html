<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
  <link href="../global.css" rel="stylesheet"> 
  <title>Success</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #ffffff;
      color: #000000;
      flex-direction: column;
      overflow: hidden; /* removes scrollbars */
      transform: translateY(-72px); /* moves everything up */
    }
    h1 {
      font-size: 3rem;
    }
    p {
      font-size: 1.2rem;
      color: #555;
    }

    #typeText::after {
      content: "|";
      animation: blink 0.8s infinite;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

  </style>
</head>

<script src="../typewriter.js"></script>

<body>

  
  <h1 id="typeText"></h1>

  <script>
    typeWriter("typeText", "success!", 100, () => {
      setTimeout(() => {
        window.location.href = "../message/message.html";
      }, 500);
    });
  </script>
</body>
</html>
